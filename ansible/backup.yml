---
# ============================================================
# Astana Housing — PostgreSQL Backup Playbook
# Іске қосу: ansible-playbook -i inventory.ini backup.yml
# ============================================================

- name: PostgreSQL Backup
  hosts: local
  become: false
  vars:
    backup_dir: "{{ playbook_dir }}/../backups"
    db_name: astana_housing
    db_user: postgres
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

  tasks:

    - name: Backup папкасын жасау
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    - name: PostgreSQL dump жасау
      command: >
        docker exec astana_db
        pg_dump -U {{ db_user }} {{ db_name }}
      register: dump_output

    - name: Dump файлға жазу
      copy:
        content: "{{ dump_output.stdout }}"
        dest: "{{ backup_dir }}/backup_{{ timestamp }}.sql"

    - name: Ескі backup файлдарын өшіру (7 күннен ескі)
      find:
        paths: "{{ backup_dir }}"
        patterns: "backup_*.sql"
        age: "7d"
      register: old_backups

    - name: Ескі файлдарды жою
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files }}"

    - name: Backup аяқталды
      debug:
        msg: "Backup сақталды: backups/backup_{{ timestamp }}.sql"
